# Fails a PR if any GitHub Actions `uses:` reference is not pinned to a full
# 40-character commit SHA. Mutable tags (@v4, @1.6, @main) are a supply-chain
# risk: a tag can be repointed to malicious code after review. Local actions
# (./...) are exempt; Docker refs are warned (digest-pin them separately).
#
# Parses with `yq` (a real YAML parser, preinstalled on ubuntu-latest) rather
# than a regex, so flow-style / quoted / reusable-workflow `uses:` cannot slip
# past the check. No third-party action, so the guard adds no dependency of its
# own to audit. To make it binding, mark `actions-sha-pin` a required check.

name: actions-sha-pin

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Require SHA-pinned actions
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            echo "::error::yq not found on runner; cannot verify action pinning (failing closed)."; exit 1
          fi
          viol=0
          while IFS= read -r f; do
            while IFS= read -r spec; do
              [ -z "$spec" ] && continue
              case "$spec" in
                ./*) continue ;;
                docker://*) echo "::warning file=$f::Docker ref (digest-pin separately): $spec"; continue ;;
              esac
              ref="${spec##*@}"
              if [ "$spec" = "$ref" ]; then
                echo "::error file=$f::Action not pinned (no @ref): $spec"; viol=1; continue
              fi
              case "$ref" in
                ""|*[!0-9a-f]*) echo "::error file=$f::Action not pinned to a 40-char commit SHA: $spec"; viol=1 ;;
                *) [ ${#ref} -eq 40 ] || { echo "::error file=$f::Action ref is not a 40-char commit SHA: $spec"; viol=1; } ;;
              esac
            done < <(yq -r '.. | select(tag == "!!map" and has("uses")) | .uses' "$f" 2>/dev/null)
          done < <(find .github -type f \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null)
          if [ "$viol" -ne 0 ]; then
            echo "Unpinned GitHub Actions found — pin each to a full commit SHA (e.g. owner/repo@<40-hex> # vX)." >&2
            exit 1
          fi
          echo "OK: all GitHub Actions are pinned to commit SHAs."
