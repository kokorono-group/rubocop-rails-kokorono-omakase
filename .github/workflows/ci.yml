name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
      - name: Config loads cleanly
        run: bundle exec rubocop --config rubocop.yml --show-cops > /dev/null
      - name: Dogfood the config on this repo
        run: bundle exec rubocop
      - name: Config-behavior spec
        run: bundle exec rspec
