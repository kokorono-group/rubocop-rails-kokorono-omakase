name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
      - name: Config loads cleanly
        run: bundle exec rubocop --config rubocop.yml --show-cops > /dev/null
      - name: Dogfood the config on this repo
        run: bundle exec rubocop
      - name: Config-behavior spec
        run: bundle exec rspec
